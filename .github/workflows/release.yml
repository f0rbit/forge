name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Determinism check
        run: bun run check:determinism

      - name: Build
        run: bun run build

      - name: Publish dry-run
        run: npm publish --dry-run

      - name: Publish to npm (if version changed)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          local_version=$(node -p "require('./package.json').version")
          published_version=$(npm view @f0rbit/forge version 2>/dev/null || echo "none")
          echo "local: $local_version"
          echo "published: $published_version"
          if [ "$local_version" = "$published_version" ]; then
            echo "version $local_version already on npm; skipping"
            exit 0
          fi
          npm publish --access public --provenance
